services:
  - type: web
    name: shadowtrace-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Groq — ContentAnalyzer + ThreatClassifier (Llama 3.3 70B)
      - key: GROQ_API_KEY
        sync: false
      # Neo4j AuraDB — primary graph store; without these the API silently
      # falls back to JSON and coordination/cluster analysis is lost
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      # Sarvam — Indian-language ID; falls back to a regex heuristic if unset
      - key: SARVAM_API_KEY
        sync: false
      # Hugging Face — AI-image classifier ensemble; ELA-only analysis if unset
      - key: HF_API_KEY
        sync: false
      - key: TOKENIZERS_PARALLELISM
        value: "false"
